<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Matriz de Fração</title>
  <link rel="stylesheet" href="style/style.css">
</head>
<body>
  <p>
  <a href="https://gabrielassissb.github.io/Home-Page/">
    <button type="button">Voltar para a página inicial</button>
  </a>
</p>
  
  <header>
    <h1>Matriz de Fração Estereotipada</h1>
  </header>

  <main class="layout">
    <section class="matrix-wrapper">
      <div class="matrix-container" id="matrixContainer">
        <img id="matrixImage" src="matriz.png" alt="Matriz não colorida">

        <div class="overlay" id="overlay">
          <div class="row-labels" id="rowLabels"></div>
        </div>
      </div>

      <p class="hint">
        Clique em uma peça na paleta para criar uma copia que pode mover e as copias não podem sair da matriz.
      </p>
    </section>

    <aside class="palette">
      <h2>Paleta de partes referentes a matriz</h2>
      <div class="parts-list" id="partsList">
        <img class="piece" src="1.png" draggable="false">
        <img class="piece" src="meio.png" draggable="false">
        <img class="piece" src="terco.png" draggable="false">
        <img class="piece" src="quarto.png" draggable="false">
        <img class="piece" src="sexto.png" draggable="false">
        <img class="piece" src="12.png" draggable="false">
      </div>

      <div class="controls">
        <button id="resetBtn">Resetar peças</button>
        <button id="removeOneBtn">Apagar uma peça</button>

        <p class="note">O tamamnho da peça é baseada na paleta de cor</p>
      </div>
    </aside>
  </main>

  <script src="style/objeto.js"></script>
</body>
</html>
